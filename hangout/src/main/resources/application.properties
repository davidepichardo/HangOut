spring.application.name=hangout

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/hangout
spring.datasource.username=hangout_user
spring.datasource.password=hangout_pass

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=1800000

# Google OAuth2 / OIDC
// TODO: Get Google client ID and secret from configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
