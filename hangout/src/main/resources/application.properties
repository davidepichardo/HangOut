spring.application.name=hangout

# Load local secrets from .env (standard properties format)
spring.config.import=optional:file:./.env[.properties]

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/hangout
spring.datasource.username=hangout_user
spring.datasource.password=hangout_pass

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT (jwt.secret comes from .env)
jwt.expiration=1800000

debug=true

